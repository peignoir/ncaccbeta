<!DOCTYPE html>
<html>
<head>
    <title>Test Demo Data Generation</title>
</head>
<body>
    <h1>Demo Data Test</h1>
    <button onclick="generateData()">Generate Demo Data</button>
    <button onclick="checkData()">Check LocalStorage</button>
    <button onclick="clearData()">Clear Data</button>
    <pre id="output"></pre>

    <script>
        function generateDemoUsageData() {
            const demoData = [];
            const apiKeys = [
                'l_P09uhOSDaXGOlnoj9ITw',
                'knr3amgWSL1234567890ab',
                'xyz_demo_key_987654321',
                'test_api_key_abcdef123',
                'prod_key_qwerty789012'
            ];
            
            const endpoints = [
                '/api/v1/agent/agent_user/profile',
                '/api/v1/agent/agent_user/event-list',
                '/api/v1/agent/agent_user/event-details',
                '/api/auth/login',
                '/api/auth/refresh'
            ];
            
            const now = new Date();
            
            for (let i = 0; i < 500; i++) {
                const timestamp = new Date(now.getTime() - Math.random() * 7 * 24 * 60 * 60 * 1000);
                const endpoint = endpoints[Math.floor(Math.random() * endpoints.length)];
                const apiKey = apiKeys[Math.floor(Math.random() * apiKeys.length)];
                const responseTime = Math.floor(Math.random() * 800) + 100;
                const status = Math.random() > 0.95 ? 500 : (Math.random() > 0.9 ? 404 : 200);
                
                demoData.push({
                    timestamp: timestamp.toISOString(),
                    endpoint,
                    method: endpoint.includes('auth') ? 'POST' : 'GET',
                    userId: hashUserId(apiKey),
                    responseTime,
                    status
                });
            }
            
            demoData.sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());
            return demoData;
        }

        function hashUserId(userId) {
            if (!userId) return 'anonymous';
            let hash = 0;
            for (let i = 0; i < userId.length; i++) {
                const char = userId.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return `user_${Math.abs(hash).toString(36)}_${userId.slice(0, 4)}`;
        }

        function generateData() {
            const data = generateDemoUsageData();
            localStorage.setItem('ncacc_api_usage', JSON.stringify(data));
            document.getElementById('output').textContent = `Generated ${data.length} records\n\nSample:\n${JSON.stringify(data.slice(0, 3), null, 2)}`;
        }

        function checkData() {
            const data = localStorage.getItem('ncacc_api_usage');
            if (data) {
                const parsed = JSON.parse(data);
                document.getElementById('output').textContent = `Found ${parsed.length} records in localStorage\n\nFirst 3:\n${JSON.stringify(parsed.slice(0, 3), null, 2)}`;
            } else {
                document.getElementById('output').textContent = 'No data in localStorage';
            }
        }

        function clearData() {
            localStorage.removeItem('ncacc_api_usage');
            document.getElementById('output').textContent = 'Cleared localStorage';
        }
    </script>
</body>
</html>
